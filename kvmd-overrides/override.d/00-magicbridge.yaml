# MagicBridgeV2 kvmd overrides — merged by kvmd from /etc/kvmd/override.d/
# We NEVER edit kvmd's own config files; we only add override snippets here.
# Values below are safe defaults; the V4 Mini enables H.264/WebRTC natively.

kvmd:
    # Prefer H.264 (WebRTC) as the default transport, MJPEG as fallback.
    streamer:
        h264_bitrate:
            default: 5000
        desired_fps:
            default: 40

    # Mouse jiggler available (kvmd native) — off by default, user toggles in UI.
    hid:
        mouse:
            jiggler:
                enabled: false

# Default USB gadget identity the TARGET sees over USB — present a real Logitech
# Unifying Receiver instead of kvmd's default "PiKVM Composite Device" tell.
# (Applied cleanly when kvmd-otg starts fresh, e.g. on boot; the Stealth panel
# can override it live. Note: kvmd-otg must be STOPPED then STARTED to rebuild
# the gadget — a plain restart leaves the old gadget and errors FileExists.)
otg:
    vendor_id: 0x046D
    product_id: 0xC52B
    manufacturer: "Logitech"
    product: "USB Receiver"
    # kvmd's default gadget serial is the string "CAFEBABE" (a famous magic number)
    # whenever one isn't set — an instant "fake USB gadget" tell. Pin a realistic
    # one so even a fresh boot (before the Stealth panel applies anything) never
    # exposes it. The Stealth panel can randomize this live.
    serial: "7A2F19C4"

    # NOTE: kvmd's `info/meta` is a PATH to a YAML file (default /etc/kvmd/meta.yaml),
    # NOT an inline content block. Setting it to a dict makes kvmd try to open the
    # dict-as-path and throw FileNotFoundError on every /api/info meta read. Our UI
    # surfaces the MagicBridgeV2 brand/version from its own strings, so we leave
    # kvmd's default meta.yaml untouched here.
